
services:

  # ─── Databases ───────────────────────────────────────────────────────────────

  users-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - users-db-data:/var/lib/postgresql/data

  products-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: products_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - products-db-data:/var/lib/postgresql/data

  orders-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - orders-db-data:/var/lib/postgresql/data

  # ─── Services ────────────────────────────────────────────────────────────────

  user-service:
    build: ./user-service
    ports:
      - "3001:3001"
    env_file:
      - ./user-service/.env
    depends_on:
      - users-db

  product-service:
    build: ./product-service
    ports:
      - "3002:3002"
    env_file:
      - ./product-service/.env
    depends_on:
      - products-db

  order-service:
    build: ./order-service
    ports:
      - "3003:3003"
    env_file:
      - ./order-service/.env
    depends_on:
      - orders-db
      - user-service
      - product-service

  notification-service:
    build: ./notification-service
    ports:
      - "3004:3004"
    env_file:
      - ./notification-service/.env
    depends_on:
      - order-service
      - products-db

volumes:
  users-db-data:
  products-db-data:
  orders-db-data:
