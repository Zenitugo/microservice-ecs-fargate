AWSTemplateFormatVersion: "2010-09-09"

Description: Application Load Balancer stack for microservices project - Load balancer, target group and listener

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - staging
      - dev
      - prod
    Description: Environment name used to tag and name all resources

  Scheme:
    Type: String
    Default: internet-facing
    AllowedValues:
      - internet-facing
      - internal
    Description: Scheme for the load balancer (internet-facing or internal)

  LoadBalancerType:
    Type: String
    Default: application
    AllowedValues:
      - application
      - network
    Description: Type of load balancer (application or network)

  Protocol:
    Type: String
    Default: HTTP
    AllowedValues:
      - HTTP
      - HTTPS
    Description: Protocol for the target group (HTTP or HTTPS)

  Port:
    Type: Number
    Default: 80
    AllowedValues:
      - 80
      - 443
    Description: Port for the target group to listen on


Resources:
  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${Environment}-app-lb"
      Type: !Ref LoadBalancerType
      Scheme: !Ref Scheme
      Subnets:
        - !ImportValue
          Fn::Sub: "${Environment}-public-subnet-1-id"
        - !ImportValue
          Fn::Sub: "${Environment}-public-subnet-2-id"
      SecurityGroups:
        - !ImportValue
          Fn::Sub: "${Environment}-lb-sg-id"
      LoadBalancerAttributes:
        - Key: "deletion_protection.enabled"
          Value: "false"
      Tags:
        - Key: Environment
          Value: !Ref Environment

  LoadBalancerListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      Name: !Sub "${Environment}-app-listener"
      LoadBalancerArn: !Ref LoadBalancer
      Protocol: !Ref Protocol
      Port: !Ref Port
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: "404"
            MessageBody: "Not Found"

  UserServiceTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${Environment}-user-app-tg"
      Protocol: !Ref Protocol
      Port: !Ref Port
      TargetType: ip
      VpcId: !ImportValue
        Fn::Sub: "${Environment}-vpc-id"
      HealthCheckPath: /users/health
      HealthCheckIntervalSeconds: 30 

  UserServiceListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref LoadBalancerListener
      Priority: 1
      Conditions:
        - Field: path-pattern
          Values:
            - /users/*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref UserServiceTargetGroup
  

  ProductServiceTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${Environment}-product-app-tg"
      Protocol: !Ref Protocol
      Port: !Ref Port
      TargetType: ip
      VpcId: !ImportValue
        Fn::Sub: "${Environment}-vpc-id"
      HealthCheckPath: /products/health
      HealthCheckIntervalSeconds: 30 

  ProductServiceListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref LoadBalancerListener
      Priority: 2
      Conditions:
        - Field: path-pattern
          Values:
            - /products/*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref ProductServiceTargetGroup


  OrderServiceTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${Environment}-order-app-tg"
      Protocol: !Ref Protocol
      Port: !Ref Port
      TargetType: ip
      VpcId: !ImportValue
        Fn::Sub: "${Environment}-vpc-id"
      HealthCheckPath: /orders/health
      HealthCheckIntervalSeconds: 30


  OrderServiceListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref LoadBalancerListener
      Priority: 3
      Conditions:
        - Field: path-pattern
          Values: 
            - /orders/*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref OrderServiceTargetGroup  




Outputs:
  LoadBalancerDNSName:
    Description: DNS name of the created load balancer
    Value: !GetAtt LoadBalancer.DNSName
    Export:
      Name: !Sub "${Environment}-LoadBalancerDNSName"

  UserServiceTargetGroupARN:
    Description: ARN of the created user service target group
    Value: !Ref UserServiceTargetGroup
    Export:
      Name: !Sub "${Environment}-UserServiceTargetGroupARN"

  ProductServiceTargetGroupARN:
    Description: ARN of the created product service target group
    Value: !Ref ProductServiceTargetGroup
    Export:
      Name: !Sub "${Environment}-ProductServiceTargetGroupARN"

  OrderServiceTargetGroupARN:
    Description: ARN of the created order service target group
    Value: !Ref OrderServiceTargetGroup
    Export:
      Name: !Sub "${Environment}-OrderServiceTargetGroupARN"