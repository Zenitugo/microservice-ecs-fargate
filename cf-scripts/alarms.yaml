AWSTemplateFormatVersion: "2010-09-09"

Description: Observability stack for microservices project - CloudWatch Logs, Metrics, Alarms, Container Insights and X-Ray

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name used to tag and name all resources

  AlertEmail:
    Type: String
    Description: Email address to receive CloudWatch Alarm notifications
    Default: dhebbiespride@gmail.com

Resources:

 # ----- USER  SERVICE ALARMS -----

  # Alert when User Service CPU is too high
  # Economic principle: this is your smoke detector for over-provisioning
  UserServiceCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${Environment}-user-service-high-cpu"
      AlarmDescription: "User Service CPU exceeded 80% - consider scaling up or right-sizing"
      Namespace: AWS/ECS
      MetricName: CPUUtilization
      Dimensions:
        - Name: ClusterName
          Value: !Sub "${Environment}-cluster-name"
        - Name: ServiceName
          Value: !Sub "${Environment}-user-service"
      Statistic: Average
      Period: 300          # check every 5 minutes
      EvaluationPeriods: 2 # alarm if breached 2 times in a row
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic  # also notify when it recovers

  # Alert when User Service Memory is too high
  UserServiceMemoryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${Environment}-user-service-high-memory"
      AlarmDescription: "User Service Memory exceeded 80% - consider increasing memory allocation"
      Namespace: AWS/ECS
      MetricName: MemoryUtilization
      Dimensions:
        - Name: ClusterName
          Value: !Sub "${Environment}-cluster-name"
        - Name: ServiceName
          Value: !Sub "${Environment}-user-service"
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic

