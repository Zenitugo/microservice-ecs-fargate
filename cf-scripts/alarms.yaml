      AlarmDescription: "RDS connections exceeded 80 - approaching connection limit"
      Namespace: AWS/RDS
      MetricName: DatabaseConnections
      Dimensions:
        - Name: DBInstanceIdentifier
          Value: !ImportValue
            Fn::Sub: "${Environment}-product-rds-identifier"
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic


  OrderRDSCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${Environment}-order-rds-high-cpu"
      AlarmDescription: "RDS CPU exceeded 80% - database under heavy load"
      Namespace: AWS/RDS
